name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Lint
        run: mise exec -- pnpm run lint

      - name: Test
        run: mise exec -- pnpm run test
