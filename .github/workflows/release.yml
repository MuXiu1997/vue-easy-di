name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: jdx/mise-action@v3

      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile

      - name: Build
        run: mise exec -- pnpm run build

      - name: Publish (next)
        if: contains(needs.release-please.outputs.tag_name, '-')
        run: mise exec -- pnpm publish --access public --no-git-checks --provenance --tag next

      - name: Publish
        if: '!contains(needs.release-please.outputs.tag_name, ''-'')'
        run: mise exec -- pnpm publish --access public --no-git-checks --provenance
